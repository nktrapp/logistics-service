name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write # tags, CHANGELOG commit, GitHub release
  issues: write
  pull-requests: write
  packages: write # push image to GHCR

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release & Jib Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false # semantic-release authenticates with GITHUB_TOKEN

      - name: Verify approved commit is still main HEAD
        shell: bash
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          APPROVED_SHA="${{ github.event.workflow_run.head_sha }}"
          CURRENT_MAIN="$(git rev-parse origin/main)"

          if [ "$CURRENT_MAIN" != "$APPROVED_SHA" ]; then
            echo "Skipping release: main moved from CI-approved commit $APPROVED_SHA to $CURRENT_MAIN."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
            exit 0
          fi

          git checkout -B main "$APPROVED_SHA"

      - name: Set up JDK 25 (Gradle runtime)
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Node
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Log in to GitHub Container Registry (for Jib push)
        if: ${{ env.SKIP_RELEASE != 'true' }}
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute lowercase image name
        if: ${{ env.SKIP_RELEASE != 'true' }}
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Semantic Release (version, changelog, tag, GitHub release, Jib image)
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: cycjimmy/semantic-release-action@v5
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
