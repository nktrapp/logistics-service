name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write # tags, CHANGELOG commit, GitHub release
  issues: write
  pull-requests: write
  id-token: write # OIDC token used to assume the AWS role for the ECR push

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release & Jib Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false # semantic-release authenticates with GITHUB_TOKEN

      - name: Verify approved commit is still main HEAD
        shell: bash
        run: |
          git fetch origin +refs/heads/main:refs/remotes/origin/main
          APPROVED_SHA="${{ github.event.workflow_run.head_sha }}"
          CURRENT_MAIN="$(git rev-parse origin/main)"

          if [ "$CURRENT_MAIN" != "$APPROVED_SHA" ]; then
            echo "Skipping release: main moved from CI-approved commit $APPROVED_SHA to $CURRENT_MAIN."
            echo "SKIP_RELEASE=true" >> "$GITHUB_ENV"
            exit 0
          fi

          git checkout -B main "$APPROVED_SHA"

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: '25'
          native-image-job-reports: true

      - name: Set up Gradle
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Node
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR (for Jib push)
        if: ${{ env.SKIP_RELEASE != 'true' }}
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute ECR image name
        if: ${{ env.SKIP_RELEASE != 'true' }}
        run: echo "IMAGE=${{ steps.ecr.outputs.registry }}/furb-logistics/logistics-service" >> "$GITHUB_ENV"

      - name: Semantic Release (version, changelog, tag, GitHub release, Jib image)
        if: ${{ env.SKIP_RELEASE != 'true' }}
        uses: cycjimmy/semantic-release-action@v5
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.IMAGE }}
