plugins {
    alias(libs.plugins.spring.boot)
    alias(libs.plugins.spring.dependency.management)
    alias(libs.plugins.jib)
}

dependencyManagement {
    imports {
        mavenBom "io.awspring.cloud:spring-cloud-aws-dependencies:${libs.versions.springCloudAws.get()}"
    }
}

dependencies {
    implementation project(':domain')
    implementation project(':infrastructure')

    implementation libs.jakarta.validation.api
    implementation libs.slf4j.api
    implementation libs.spring.tx
    implementation libs.spring.boot.starter.webmvc
    implementation libs.spring.boot.starter.actuator
    implementation libs.spring.boot.starter.validation
    implementation libs.spring.cloud.aws.starter.sqs
    implementation libs.jackson.databind
    implementation libs.mapstruct

    annotationProcessor libs.mapstruct.processor
    annotationProcessor libs.lombok.mapstruct.binding

    testImplementation libs.spring.boot.starter.test
    testImplementation libs.testcontainers.mongodb
    testImplementation libs.testcontainers.junit.jupiter
}

tasks.named('bootJar') {
    archiveFileName = "${project.parent?.name}.jar"
}

// Defaults are local-friendly; CI overrides the target with -Djib.to.image / -Djib.to.tags.
jib {
    from {
        image = 'eclipse-temurin:25-jre'
        platforms {
            platform {
                architecture = 'amd64'
                os = 'linux'
            }
        }
    }
    to {
        image = 'logistics-service'
        tags = [project.version.toString()]
    }
    container {
        ports = ['8080']
        user = '1000:1000'
        jvmFlags = ['-XX:+UseZGC', '-XX:MaxRAMPercentage=75.0']
        environment = ['SPRING_PROFILES_ACTIVE': 'prod']
        creationTime = 'USE_CURRENT_TIMESTAMP'
    }
}
