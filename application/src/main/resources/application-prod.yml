spring:
  mongodb:
    uri: ${MONGODB_URI}
  data:
    mongodb:
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

spring.cloud.aws:
  region:
    static: ${AWS_REGION:us-east-1}
  sqs:
    endpoint: ""
    queue-not-found-strategy: fail

app:
  viacep:
    base-url: https://viacep.com.br/ws

logging:
  level:
    root: INFO
    br.furb: INFO
  structured:
    format:
      console: logstash
    json:
      add:
        serviceName: ${spring.application.name}
        environment: ${APP_ENVIRONMENT:${spring.profiles.active:prod}}
        version: ${APP_VERSION:unknown}
