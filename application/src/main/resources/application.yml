spring:
  application:
    name: logistics-service
  jackson:
    default-property-inclusion: non_null
    datatype:
      datetime:
        write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  web:
    error:
      include-message: always
      include-binding-errors: always
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,scheduledtasks,threaddump
      base-path: /management
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
    export:
      otlp:
        enabled: ${MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED:false}
  opentelemetry:
    resource-attributes:
      "service.namespace": furb-logistics
      "deployment.environment": ${APP_ENVIRONMENT:${spring.profiles.active:local}}
    tracing:
      export:
        otlp:
          endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:}
          transport: http
  otlp:
    metrics:
      export:
        enabled: false
  logging:
    export:
      otlp:
        enabled: false
  health:
    mongodb:
      enabled: true
    redis:
      enabled: true
  info:
    env:
      enabled: true
    git:
      enabled: true

server:
  port: ${SERVER_PORT:0}
  shutdown: graceful

logging:
  level:
    root: INFO
    br.furb: INFO
    io.awspring.cloud: INFO
    org.springframework.data.mongodb: WARN
  pattern:
    correlation: "%replace([trace:%X{traceId:-}] ){'\\[trace:\\] ', ''}"

app:
  viacep:
    base-url: https://viacep.com.br/ws
    timeout-ms: 5000
    retry-max-attempts: 3
    retry-backoff-ms: 1000
  messaging:
    inbound-queue: ${APP_MESSAGING_INBOUND_QUEUE:package-events-queue.fifo}
    outbound-queue: ${APP_MESSAGING_OUTBOUND_QUEUE:logistics-events-queue.fifo}
    hub-events-queue: ${APP_MESSAGING_HUB_EVENTS_QUEUE:hub-events-queue.fifo}
  routing:
    auto-connect:
      neighbors: ${APP_ROUTING_AUTO_CONNECT_NEIGHBORS:3}            # nº de vizinhos mais próximos (K)
      avg-speed-kmh: ${APP_ROUTING_AUTO_CONNECT_AVG_SPEED_KMH:60}   # velocidade média p/ derivar transitTimeHours
  outbox:
    relay:
      fixed-delay-ms: 2000
      batch-size: 50
      max-attempts: 5
      retry-delay-ms: 5000             # base delay for exponential backoff (doubles each attempt)
      max-retry-delay-ms: 60000        # cap for the exponential backoff delay
      processing-timeout-ms: 60000
    retention:
      fixed-delay-ms: 3600000        # purge sweep interval (1h)
      published-retention-ms: 604800000  # keep published events 7 days
