spring:
  application:
    name: logistics-service
  jackson:
    default-property-inclusion: non_null
    datatype:
      datetime:
        write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  web:
    error:
      include-message: always
      include-binding-errors: always
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
      base-path: /management
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    mongodb:
      enabled: true
    redis:
      enabled: true
  info:
    env:
      enabled: true
    git:
      enabled: true

server:
  port: {SERVER_PORT:0}
  shutdown: graceful

logging:
  level:
    root: INFO
    br.furb: INFO
    io.awspring.cloud: INFO
    org.springframework.data.mongodb: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

app:
  viacep:
    base-url: https://viacep.com.br/ws
    timeout-ms: 5000
    retry-max-attempts: 3
    retry-backoff-ms: 1000
  messaging:
    inbound-queue: ${APP_MESSAGING_INBOUND_QUEUE:package-events-queue.fifo}
    outbound-queue: ${APP_MESSAGING_OUTBOUND_QUEUE:logistics-events-queue.fifo}
  outbox:
    relay:
      fixed-delay-ms: 2000
      batch-size: 50
      max-attempts: 5
      retry-delay-ms: 5000
      processing-timeout-ms: 60000
    retention:
      fixed-delay-ms: 3600000        # purge sweep interval (1h)
      published-retention-ms: 604800000  # keep published events 7 days
