name: logistics-service

services:
  ministack:
    image: ministackorg/ministack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,secretsmanager,cloudwatch,ssm
      - DEFAULT_REGION=us-east-1
      - EAGER_SERVICE_LOADING=1
    volumes:
      - ministack-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4566/_ministack/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  mongodb:
    image: mongo:8.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: admin
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }; db.hello().isWritablePrimary || quit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  terraform-contracts:
    image: hashicorp/terraform:1.8.5
    depends_on:
      ministack:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        rm -rf /workdir
        cp -R /workspace /workdir
        terraform -chdir=/workdir/envs/local/ministack/contracts init -input=false
        terraform -chdir=/workdir/envs/local/ministack/contracts apply -auto-approve -input=false
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      TF_DATA_DIR: /terraform-data
      TF_VAR_ministack_endpoint: http://ministack:4566
      TF_VAR_environment: local
      TF_VAR_project_name: logistic
      TF_VAR_queue_name_prefix: ""
    volumes:
      - ${LOGISTIC_IAC_PATH:-../logistic-iac}:/workspace:ro
      - terraform-state:/terraform-state
      - terraform-data:/terraform-data

  logistics-service:
    build:
      context: .
      dockerfile: application/Dockerfile
    #image: 934347069710.dkr.ecr.us-east-1.amazonaws.com/furb-logistics/logistics-service:1.2.0
    image: nktrapp/logistics-service:1.0.5
    ports:
      - "0:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/logistics_db?directConnection=true
      REDIS_HOST: redis
      AWS_REGION: us-east-1
      SPRING_CLOUD_AWS_ENDPOINT: http://ministack:4566
      SPRING_CLOUD_AWS_SQS_ENDPOINT: http://ministack:4566
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: test
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: test
      SPRING_CLOUD_AWS_REGION_STATIC: us-east-1
      APP_VIACEP_BASE_URL: https://viacep.com.br/ws
      APP_MESSAGING_INBOUND_QUEUE: package-events-queue.fifo
      APP_MESSAGING_OUTBOUND_QUEUE: logistics-events-queue.fifo
      APP_MESSAGING_HUB_EVENTS_QUEUE: hub-events-queue.fifo
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      terraform-contracts:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/management/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  package-service:
    build:
      context: ../package-service
      dockerfile: application/Dockerfile
    #image: 934347069710.dkr.ecr.us-east-1.amazonaws.com/furb-logistics/package-service:1.2.0
    image: nktrapp/package-service:1.0.5
    ports:
      - "0:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/package_db?directConnection=true
      AWS_REGION: us-east-1
      SPRING_CLOUD_AWS_ENDPOINT: http://ministack:4566
      SPRING_CLOUD_AWS_SQS_ENDPOINT: http://ministack:4566
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: test
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: test
      SPRING_CLOUD_AWS_REGION_STATIC: us-east-1
      APP_MESSAGING_INBOUND_QUEUE: logistics-events-queue.fifo
      APP_MESSAGING_OUTBOUND_QUEUE: package-events-queue.fifo
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0"
    depends_on:
      mongodb:
        condition: service_healthy
      terraform-contracts:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/management/health/liveness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0
    ports:
      - "8888:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/?directConnection=true
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  ministack-data:
  mongodb-data:
  redis-data:
  terraform-state:
  terraform-data:
