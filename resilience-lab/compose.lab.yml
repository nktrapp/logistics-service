# Images built from the current working tree are post-1.0.5: the OTLP exporter is
# frozen into the native image (build-time decision), so a syntactically valid
# endpoint is mandatory even with tracing sampled out (probability 0).
services:
  package-service:
    image: nktrapp/package-service:lab
    ports: ["8081:8080"]
    environment:
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0"
  logistics-service:
    image: nktrapp/logistics-service:lab
    ports: ["8082:8080"]
    environment:
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://localhost:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0"
